backend:
  name: github
  repo: jskroening-afk/my-site
  branch: main
  auth_type: pkce
  app_id: REPLACE_WITH_GITHUB_OAUTH_APP_CLIENT_ID

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: Blog Posts
    folder: content/posts
    create: true
    delete: true
    slug: "{{slug}}"
    extension: mdx
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ss.000Z"
        date_format: "MMMM D, YYYY"
        time_format: false
      - label: Category
        name: category
        widget: select
        options:
          - Strategy
          - Leadership
          - Coaching
          - Thinking
      - { label: Excerpt, name: excerpt, widget: text }
      - { label: Read Time, name: readTime, widget: string, default: "5 min read" }
      - label: Cover Image
        name: coverImage
        widget: image
        required: false
        allow_multiple: false
        media_library:
          config:
            multiple: false
      - { label: Body, name: body, widget: markdown }
